# ─── Netlify Build Config ────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

# ─── Next.js Plugin (App Router + SSR/ISR support) ───────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"
