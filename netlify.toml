# ─── Netlify Build Config ────────────────────────────────────────────────────

[build]
  command = "npm run build"
  # Publish-Verzeichnis setzt @netlify/plugin-nextjs automatisch (nicht .next manuell setzen)

[build.environment]
  NODE_VERSION = "20"

# ─── Next.js Plugin (App Router + SSR/ISR support) ───────────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"
